server.port=${APP_PORT:8080}

spring.application.name=rag-chat-storage-service

spring.datasource.url=jdbc:h2:file:${DB_PATH:./data/rag-chat};MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true

spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

spring.jackson.serialization.write-dates-as-timestamps=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

springdoc.swagger-ui.path=/swagger-ui.html

app.security.api-key-header=${API_KEY_HEADER:X-API-Key}
app.security.api-key=${API_KEY:change-me}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.rate-limit.capacity=${RATE_LIMIT_CAPACITY:60}
app.rate-limit.window=${RATE_LIMIT_WINDOW:PT1M}

logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSX} [%thread] %-5level %logger{36} [req=%X{requestId:-na} corr=%X{correlationId:-na} path=%X{apiPath:-na}] - %msg%n
