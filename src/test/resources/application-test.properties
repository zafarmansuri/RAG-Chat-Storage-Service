spring.datasource.url=jdbc:h2:mem:ragchat;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true

app.security.api-key-header=X-API-Key
app.security.api-key=test-api-key
app.cors.allowed-origins=http://localhost:3000
app.rate-limit.capacity=1000
app.rate-limit.window=PT1M
