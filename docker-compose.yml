services:
  app:
    build:
      context: .
    container_name: rag-chat-storage-service
    restart: on-failure
    environment:
      APP_PORT: ${APP_PORT:-8080}
      DB_PATH: ${DB_PATH:-/app/data/rag-chat}
      DB_USERNAME: ${DB_USERNAME:-sa}
      DB_PASSWORD: ${DB_PASSWORD:-}
      H2_CONSOLE_ENABLED: ${H2_CONSOLE_ENABLED:-true}
      API_KEY_HEADER: ${API_KEY_HEADER:-X-API-Key}
      API_KEY: ${API_KEY:-change-me}
      RATE_LIMIT_CAPACITY: ${RATE_LIMIT_CAPACITY:-60}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-PT1M}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - h2-data:/app/data

volumes:
  h2-data:
